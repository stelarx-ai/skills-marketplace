version: 1
skills:
  - id: chubbyskills
    name: "Chubby Skills"
    name_zh: "Chubby 内容采集技能包"
    description: "Ingest Chinese content (Douyin/Bilibili/XHS/WeChat/X/Podcast) into your personal knowledge base"
    description_zh: "把中文全渠道内容（抖音/B站/小红书/公众号/X/播客）采集进个人知识库"
    icon: "🧰"
    version: "0.10.0"
    author: "chubbyguan"
    homepage: "https://github.com/chubbyguan/chubbyskills"
    tags: ["content", "transcription", "knowledge-base", "chinese"]
    params:
      - key: variant
        label: "Installation Level"
        label_zh: "安装级别"
        type: select
        default: "light"
        options:
          - value: "light"
            label: "Light"
            label_zh: "轻量安装"
            description: "Text/image ingestion + KB management, no GPU needed"
            description_zh: "图文采集 + 知识库管理，无需 GPU"
          - value: "video"
            label: "Full"
            label_zh: "完整安装"
            description: "Includes video transcription (needs ffmpeg + GPU)"
            description_zh: "含视频转录（需 ffmpeg + GPU）"
          - value: "all"
            label: "All"
            label_zh: "全部安装"
            description: "All features including podcast transcription"
            description_zh: "所有功能（含播客转录）"
      - key: vault_dir
        label: "Obsidian Vault Directory"
        label_zh: "Obsidian 知识库目录"
        type: text
        default: ""
        placeholder: "Leave empty to skip knowledge base integration"
        placeholder_zh: "留空则跳过知识库集成"
        optional: true

  - id: account-launch-pack
    name: "Account Launch Experts"
    name_zh: "自媒体起号专家技能包"
    description: "Chinese platform account launch planning: WeChat, Xiaohongshu, Douyin, Channels, X/Twitter — positioning, content strategy, cold-start playbooks, and review loops"
    description_zh: "五大中文平台起号规划：公众号、小红书、抖音、视频号、X/Twitter — 定位、选题、内容日历、冷启动和复盘框架"
    icon: "🚀"
    version: "0.1.0"
    author: "chenjin-cmd"
    homepage: "https://github.com/chenjin-cmd/agent-skills-launch-pack_"
    tags: ["content-strategy", "account-launch", "chinese", "wechat", "xiaohongshu", "douyin", "twitter"]
    params:
      - key: skills
        label: "Skills to Install"
        label_zh: "要安装的技能"
        type: select
        default: "all"
        options:
          - value: "all"
            label: "All 5 Skills"
            label_zh: "全部 5 个技能"
            description: "WeChat + Xiaohongshu + Douyin + Channels + X/Twitter"
            description_zh: "公众号 + 小红书 + 抖音 + 视频号 + X/Twitter"
          - value: "wechat"
            label: "WeChat Only"
            label_zh: "仅公众号"
            description: "WeChat Official Account launch planning, positioning, topic library, article briefs, publishing cadence, and weekly review"
            description_zh: "公众号起号、定位、选题库、文章简报、发布节奏和周复盘"
          - value: "xiaohongshu"
            label: "Xiaohongshu Only"
            label_zh: "仅小红书"
            description: "Xiaohongshu account positioning, note briefs, content calendar, conversion path, and review loop"
            description_zh: "小红书账号定位、笔记简报、内容日历、转化路径和复盘"
          - value: "douyin"
            label: "Douyin Only"
            label_zh: "仅抖音"
            description: "Douyin cold start planning, viewing reasons, 9-video experiments, interaction design, and performance review"
            description_zh: "抖音新号冷启动、观看理由、9 条视频实验、互动和复盘"
          - value: "channels"
            label: "Channels Only"
            label_zh: "仅视频号"
            description: "WeChat Channels launch planning, account positioning and persona, viral content formulas, private-domain cold start, data calibration, and review"
            description_zh: "视频号起号、账号定位与人设、爆款内容公式、私域冷启动、数据校准和复盘"
          - value: "x-twitter"
            label: "X/Twitter Only"
            label_zh: "仅 X/Twitter"
            description: "Chinese X/Twitter cold start planning, positioning, reply-based discovery, post/thread conversion, and 7-day execution plan"
            description_zh: "中文 X/Twitter 冷启动、定位、回复区曝光、主贴转化和 7 天计划"
